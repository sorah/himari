name: release

on:
  push:
    tags:
      - 'himari/v*'
      - 'himari-aws/v*'
      - 'omniauth-himari/v*'

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/_test.yml

  release:
    needs: [test]
    runs-on: ubuntu-latest
    # The gem is selected by the pushed tag. Tags are prefixed per gem and
    # formatted as "<gem>/v<version>" (Bundler::GemHelper.tag_prefix), e.g.
    # himari/v0.5.0, so the gem name doubles as its subdirectory.
    permissions:
      contents: write
      id-token: write
    environment:
      name: rubygems-org
      url: ${{ steps.gem.outputs.url }}
    steps:
      - name: Identify gem from tag
        id: gem
        run: |
          gem_name="${GITHUB_REF_NAME%/v*}"
          version="${GITHUB_REF_NAME##*/v}"
          {
            echo "name=${gem_name}"
            echo "version=${version}"
            echo "url=https://rubygems.org/gems/${gem_name}/versions/${version}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '4.0'
      - run: bundle install --jobs 4
      - name: Create GitHub release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          VERSION: ${{ steps.gem.outputs.version }}
          GEM_DIR: ${{ steps.gem.outputs.name }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.GITHUB_REF_NAME;
            const { VERSION, GEM_DIR } = process.env;
            const { owner, repo } = context.repo;

            // Generate notes first so GitHub computes the "Full Changelog" compare link.
            const { data: release } = await github.rest.repos.createRelease({
              owner, repo, tag_name: tag, draft: true, generate_notes: true,
            });

            // Extract this version's section from the gem CHANGELOG.md.
            const lines = fs.readFileSync(`${GEM_DIR}/CHANGELOG.md`, 'utf8').split('\n');
            const start = lines.findIndex((l) => l.startsWith(`## [${VERSION}]`));
            if (start === -1) throw new Error(`no CHANGELOG.md section for ${VERSION}`);
            const rest = lines.slice(start + 1);
            const end = rest.findIndex((l) => l.startsWith('## ['));
            const section = (end === -1 ? rest : rest.slice(0, end)).join('\n').trim();

            // Keep the auto-generated "Full Changelog" link.
            const fullChangelog = (release.body || '').split('\n').find((l) => l.includes('Full Changelog'));
            const body = fullChangelog ? `${section}\n\n${fullChangelog}` : section;

            await github.rest.repos.updateRelease({ owner, repo, release_id: release.id, body });
      - name: Publish to RubyGems
        uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0
        with:
          working-directory: ${{ steps.gem.outputs.name }}
